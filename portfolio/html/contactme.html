<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
</head>

<body>
  <nav>
    <a href="../index.html">Home</a> |
    <a href="education.html">Education</a> |
    <a href="experience.html">Experience</a> |
    <a href="projects.html">Projects</a> |
  </nav>
  <hr>

  <form method="post">
    <fieldset>
      <legend>Contact Me</legend>
      <table>

        <tr>
          <td><label for="name">Name:</label></td>
          <td><input type="text" id="name" name="name" required></td>
        </tr>

        <tr>
          <td><label for="email">Email:</label></td>
          <td><input type="email" id="email" name="email" required></td>
        </tr>

        <tr>
          <td><label>Gender:</label></td>
          <td>
            <input type="radio" name="Gender" value="male">Male
            <input type="radio" name="Gender" value="female">Female
          </td>
        </tr>

        <tr>
          <td><label>Services:</label></td>
          <td>
            <input type="checkbox" value="htmal">HTML
            <input type="checkbox" value="css">CSS
            <input type="checkbox" value="javascript">JavaScript
            <input type="checkbox" value="python">Python
          </td>
        </tr>

        <tr>
          <td><label for="country">Country:</label></td>
          <td>
            <select id="country" name="country">
              <option value="select country">Select a Country</option>
              <option value="BD">Bangladesh</option>
              <option value="USA">United States</option>
              <option value="canada">Canada</option>
              <option value="UK">United Kingdom</option>
            </select>
          </td>
        </tr>

        <tr>
          <td><label for="reason">Reason for contact:</label></td>
          <td>
            <select id="reason" name="reason">
              <option>Select a Reason</option>
              <option>job</option>
              <option>feedback</option>
              <option>other</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Book Slot:</td>
          <td><input type="datetime-local"></td>
        </tr>

        <tr>
          <td></td>
          <td>
            <br>
            <input type="Submit" value="Submit">
            <input type="reset" value="Reset">
          </td>
        </tr>
      </table>
    </fieldset>
  </form>
</body>

</html>
