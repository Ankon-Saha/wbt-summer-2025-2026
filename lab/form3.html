<!DOCTYPE html>
<html lang="en">

<head>
    <title>Form3</title>
</head>

<body>
    <form method="post">
        <h1>Create your account</h1>
        <h4>join us in a couple of steps.</h4>
        <hr>

        <div class="form3-group">
            <label for="Full Name">Full name</label>
            <input type="text" placeholder="Full Name" id="Full Name" name="Full Name">
        </div>

        <div class="form3-group">
            <label for="age">Age</label>
            <input type="number" placeholder="Age" id="age" name="age">
        </div>

        <div class="form3-group">
            <label for="date-of-birth">Date of birth</label>
            <input type="date" placeholder="Date of Birth" id="date-of-birth" name="date-of-birth">
        </div>

        <div class="form3-group">
            <label for="email">Email address</label>
            <input type="email" placeholder="Email Address" id="email" name="email">
        </div>

        <div class="form3-group">
            <label for="password">Password</label>
            <input type="password" placeholder="Password" id="password" name="password">
        </div>

        <div class="form3-group">
            <label>Preferred contact</label>
            <input type="radio" name="preferred contact" value="preferred contact">Email
            <input type="radio" name="preferred contact" value="preferred contact">Phone
            <input type="radio" name="preferred contact" value="preferred contact">SMS
        </div>

        <div class="button3-group">
            <button type="submit" class="btn-primary">Submit</button>
            <button type="reset" class="btn-secondary">Reset</button>
        </div>

    </form>

</body>
