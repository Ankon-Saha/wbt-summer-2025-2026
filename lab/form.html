<!DOCTYPE html>
<html>

  <body>
        
    <form method= "post">

        <legend>Donor Information</legend>
        <table>
            
          <tr>
             <td><label for="first name">First Name*</label></td>
            <td><input type="text" id="first name" name="first_name" required></td>
          </tr>

          <tr>
            <td><label for="last name">Last Name*</label></td>
            <td><input type="text" id="last name" name="last_name" required></td>
          </tr>

          <tr>
            <td><label for="company">Company</label></td>
            <td><input type="text" id="company" name="company"></td>
          </tr>

           <tr>
            <td><label for="address 1">Address 1*</label></td>
            <td><input type="text" id="address 1" name="address_1" required></td>
          </tr>

           <tr>
            <td><label for="address 2">Address 2*</label></td>
            <td><input type="text" id="address 2" name="address_2" required></td>
          </tr>

           <tr>
            <td><label for="city">City*</label></td>
            <td><input type="text" id="city" name="city"></td>
          </tr>

          <tr>
            <td><label for="state">State*</label></td>
            <td>
              <select id="state" name="state" >
                <option>Select a State</option>
                <option>California</option>
                <option>Texas</option>
                <option>New York</option>
              </select>
            </td>
          </tr>

          <tr>
            <td><label for="zip">Zip Code*</label></td>
            <td><input type="text" id="zip" name="zip" pattern="[0-9]{4}"></td>
          </tr>

          <tr>
            <td><label for="country">Country*</label></td>
            <td>
              <select id="country" name="country" required>
                <option>Select a Country</option>
                <option>Bangladesh</option>
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
              </select>
            </td>
          </tr>

          <tr>
            <td><label for="phone">Phone</label></td>
            <td><input type="tel" id="phone" name="phone"></td>
          </tr>

          <tr>
            <td><label for="fax">Fax</label></td>
            <td><input type="tel" id="fax" name="fax"></td>
          </tr>

            <tr>
            <td><label for="email">Email*</label></td>
            <td><input type="email" id="email" name="email" required></td>
          </tr>

          <tr>
            <td><label>Donation Amount*</label></td>
            <td>
              <input type="radio" id="none" name="amount" value="none">None
              <input type="radio" id="$50" name="amount" value="$50">$50
              <input type="radio" id="$75" name="amount" value="$75">$75
              <input type="radio" id="$100" name="amount" value="$100">$100
              <input type="radio" id="$250" name="amount" value="$250">$250
              <input type="radio" id="other" name="amount" value="other">Other
            </td>
          </tr>

        <tr>
          <td><label for="other-amount">Other Amount $</label></td>
          <td><input type="number" id="other-amount" name="other-amount" min="0" step="0.01"></td>
        </tr>

        <tr>
          <td><label for="requiring donation">Requiring Donation</label></td>
          <td><input type="checkbox" id="requiring donation" name="requiring donation"></td>
        </tr>

        <tr>
          <td><label for="monthly credit card">Monthly Credit Card $</label></td>
          <td><input type="number" id="monthly credit card" name="monthly credit card" pattern="[0-9]{16}"></td>
        </tr>

        </table>
    </form>
  </body>
</html>
