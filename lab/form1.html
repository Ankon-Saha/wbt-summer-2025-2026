<!DOCTYPE html>
<html lang="en">

<head>
    <title>Form1</title>
</head>

<body>
    <form method="post">
        <h5>GET STARTED</h5>
        <h2>Create your workspace</h2>
        <hr>

        <div class="form1-group">
            <label for="full-name">Full name</label>
            <input type="text" placeholder="full name" id="full-name" name="full-name">
        </div>
        <div class="form1-group">
            <label for="phone-number">phone number</label>
            <input type="number" placeholder="number" id="phone-number" name="phone-number">
        </div>
        <div class="form1-group">
            <label for="date-of-birth">Date of birth</label>
            <input type="date" id="date-of-birth" name="date-of-birth">
        </div>
        <div class="form1-group">
            <label for="work-email">Work email</label>
            <input type="email" placeholder="...@gmail.com" id="work-email" name="work-email">
        </div>
        <div class="form1-group">
            <label for="password">Password</label>
            <input type="password" placeholder="At least 8 characters" pattern=".{8,}" id="password" name="password">
        </div>
        <div class="form1-group">
            <input type="checkbox" value="Email me product updates and tips">Email me product updates and tips
            <label for="Email me product updates and tips"></label>
        </div>
        <div class="Form1-group">
            <input type="checkbox" value="I agree to the Terms & Privacy Policy">I agree to the Terms & Privacy Policy
            <label for="I agree to the Terms & Privacy Policy"></label>
        </div>
        <div class="button-group">
            <button type="Create workspace" class="btn-primary">Create workspace</button>
            <button type="Reset" class="btn-secondary">Reset</button>
        </div>

    </form>
</body>

</html>
