<!DOCTYPE html>
<html lang="en">

<head>
    <title>Form2</title>
</head>

<body>
    <form method="post">
        <h1>Registration</h1>
        <h4>Please complete all fields below.</h4>
        <hr>

        <div class="form-group">
            <label for="Full Name">Full Name</label>
            <input type="text" placeholder="Full Name" id="Full Name" name="Full Name">
        </div>

        <div class="form-group">
            <label for="postal code">Postal Code</label>
            <input type="number" placeholder="Postal Code" id="postal code" name="postal code">
        </div>

        <div class="form-group">
            <label for="date-of-birth">Date of Birth</label>
            <input type="date" placeholder="Date of Birth" id="date-of-birth" name="date-of-birth">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" placeholder="Email Address" id="email" name="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" placeholder="Password" id="password" name="password">
        </div>

        <div class="form-group">
            <label for="country">Country</label>
            <select id="country" name="country">
                <option value="select a country">Select a Country</option>
                <option value="bd">Bangladesh</option>
                <option value="USA">United States</option>
                <option value="canada">Canada</option>
                <option value="UK">United Kingdom</option>
            </select>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-primary">Submit</button>
            <button type="reset" class="btn-secondary">Reset</button>
        </div>

    </form>

</body>
